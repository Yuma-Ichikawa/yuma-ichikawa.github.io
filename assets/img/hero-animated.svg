<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560">
  <defs>
    <radialGradient id="gold" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#f6d98a"/>
      <stop offset="0.55" stop-color="#c8952d"/>
      <stop offset="1" stop-color="#8a6508"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f0c75e" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f0c75e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    .ring { fill: none; stroke: #1e2c56; }
    .breathe { transform-box: fill-box; transform-origin: center; animation: breathe 7s ease-in-out infinite; }
    .breathe.b2 { animation-duration: 9s; animation-delay: -3s; }
    .breathe.b3 { animation-duration: 8s; animation-delay: -5s; }
    .breathe.b4 { animation-duration: 10s; animation-delay: -2s; }
    @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.045); } }

    .bob { animation: bob 4.5s ease-in-out infinite; }
    .bob.s2 { animation-duration: 5.5s; animation-delay: -2s; }
    .bob.s3 { animation-duration: 6s; animation-delay: -1s; }
    .bob.s4 { animation-duration: 5s; animation-delay: -3s; }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

    .halo { animation: halo 4.5s ease-in-out infinite; }
    .halo.s2 { animation-duration: 5.5s; animation-delay: -2s; }
    .halo.s3 { animation-duration: 6s; animation-delay: -1s; }
    .halo.s4 { animation-duration: 5s; animation-delay: -3s; }
    @keyframes halo { 0%,100% { opacity: 0.45; } 50% { opacity: 0.95; } }

    .edge { stroke: #1e2c56; stroke-opacity: 0.3; stroke-width: 1; stroke-dasharray: 2 6; animation: dash 10s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -96; } }

    .node { fill: #1e2c56; animation: pulse 3.6s ease-in-out infinite; }
    .node.g { fill: #b8860b; }
    .d1 { animation-delay: -0.4s; } .d2 { animation-delay: -0.9s; } .d3 { animation-delay: -1.4s; }
    .d4 { animation-delay: -1.9s; } .d5 { animation-delay: -2.4s; } .d6 { animation-delay: -2.9s; }
    @keyframes pulse { 0%,100% { opacity: 0.45; } 50% { opacity: 1; } }
  </style>

  <!-- ===== Energy landscape (left) ===== -->
  <g transform="translate(200,330)">
    <g class="breathe">
      <ellipse class="ring" rx="36"  ry="20"  stroke-opacity="0.9"  stroke-width="1.2"/>
      <ellipse class="ring" rx="66"  ry="36"  stroke-opacity="0.7"  stroke-width="1.1"/>
      <ellipse class="ring" rx="96"  ry="53"  stroke-opacity="0.55" stroke-width="1"/>
      <ellipse class="ring" rx="126" ry="69"  stroke-opacity="0.4"  stroke-width="1"/>
      <ellipse class="ring" rx="156" ry="86"  stroke-opacity="0.25" stroke-width="1"/>
    </g>
    <circle class="halo" r="36" fill="url(#glow)"/>
    <g class="bob"><circle r="16" fill="url(#gold)"/></g>
  </g>

  <g transform="translate(340,170)">
    <g class="breathe b2">
      <ellipse class="ring" rx="28" ry="15" stroke-opacity="0.85" stroke-width="1.1"/>
      <ellipse class="ring" rx="54" ry="30" stroke-opacity="0.6"  stroke-width="1"/>
      <ellipse class="ring" rx="80" ry="44" stroke-opacity="0.42" stroke-width="1"/>
      <ellipse class="ring" rx="106" ry="58" stroke-opacity="0.26" stroke-width="1"/>
    </g>
    <circle class="halo s2" r="26" fill="url(#glow)"/>
    <g class="bob s2"><circle r="11" fill="url(#gold)"/></g>
  </g>

  <g transform="translate(115,150)">
    <g class="breathe b3">
      <ellipse class="ring" rx="22" ry="12" stroke-opacity="0.8" stroke-width="1"/>
      <ellipse class="ring" rx="44" ry="24" stroke-opacity="0.55" stroke-width="1"/>
      <ellipse class="ring" rx="66" ry="36" stroke-opacity="0.35" stroke-width="1"/>
    </g>
    <circle class="halo s3" r="20" fill="url(#glow)"/>
    <g class="bob s3"><circle r="9" fill="url(#gold)"/></g>
  </g>

  <g transform="translate(390,430)">
    <g class="breathe b4">
      <ellipse class="ring" rx="20" ry="11" stroke-opacity="0.8" stroke-width="1"/>
      <ellipse class="ring" rx="40" ry="22" stroke-opacity="0.5" stroke-width="1"/>
      <ellipse class="ring" rx="60" ry="33" stroke-opacity="0.3" stroke-width="1"/>
    </g>
    <circle class="halo s4" r="18" fill="url(#glow)"/>
    <g class="bob s4"><circle r="8" fill="url(#gold)"/></g>
  </g>

  <!-- ===== Network (right) ===== -->
  <g>
    <line class="edge" x1="530" y1="150" x2="595" y2="95"/>
    <line class="edge" x1="530" y1="150" x2="570" y2="225"/>
    <line class="edge" x1="570" y1="225" x2="620" y2="285"/>
    <line class="edge" x1="570" y1="225" x2="645" y2="185"/>
    <line class="edge" x1="595" y1="95" x2="645" y2="185"/>
    <line class="edge" x1="645" y1="185" x2="685" y2="125"/>
    <line class="edge" x1="645" y1="185" x2="725" y2="225"/>
    <line class="edge" x1="620" y1="285" x2="705" y2="305"/>
    <line class="edge" x1="620" y1="285" x2="555" y2="335"/>
    <line class="edge" x1="555" y1="335" x2="605" y2="425"/>
    <line class="edge" x1="605" y1="425" x2="700" y2="450"/>
    <line class="edge" x1="705" y1="305" x2="765" y2="365"/>
    <line class="edge" x1="705" y1="305" x2="725" y2="225"/>
    <line class="edge" x1="725" y1="225" x2="805" y2="265"/>
    <line class="edge" x1="725" y1="225" x2="785" y2="165"/>
    <line class="edge" x1="685" y1="125" x2="750" y2="85"/>
    <line class="edge" x1="685" y1="125" x2="785" y2="165"/>
    <line class="edge" x1="785" y1="165" x2="825" y2="105"/>
    <line class="edge" x1="785" y1="165" x2="855" y2="205"/>
    <line class="edge" x1="805" y1="265" x2="855" y2="205"/>
    <line class="edge" x1="805" y1="265" x2="835" y2="335"/>
    <line class="edge" x1="765" y1="365" x2="835" y2="335"/>
    <line class="edge" x1="765" y1="365" x2="700" y2="450"/>
    <line class="edge" x1="855" y1="205" x2="880" y2="145"/>

    <circle class="node d1" cx="530" cy="150" r="4"/>
    <circle class="node g d3" cx="595" cy="95" r="4.5"/>
    <circle class="node d5" cx="570" cy="225" r="4"/>
    <circle class="node d2" cx="620" cy="285" r="4"/>
    <circle class="node g d6" cx="645" cy="185" r="5"/>
    <circle class="node d4" cx="685" cy="125" r="4"/>
    <circle class="node d1" cx="750" cy="85" r="3.5"/>
    <circle class="node d3" cx="725" cy="225" r="4.5"/>
    <circle class="node g d2" cx="705" cy="305" r="4"/>
    <circle class="node d6" cx="555" cy="335" r="3.5"/>
    <circle class="node d4" cx="605" cy="425" r="3.5"/>
    <circle class="node d5" cx="700" cy="450" r="4"/>
    <circle class="node g d1" cx="765" cy="365" r="4.5"/>
    <circle class="node d2" cx="785" cy="165" r="4"/>
    <circle class="node d5" cx="825" cy="105" r="3.5"/>
    <circle class="node d3" cx="805" cy="265" r="4"/>
    <circle class="node d6" cx="835" cy="335" r="3.5"/>
    <circle class="node g d4" cx="855" cy="205" r="4.5"/>
    <circle class="node d1" cx="880" cy="145" r="3.5"/>
  </g>

  <!-- transition dots between landscape and network -->
  <g fill="#1e2c56">
    <circle class="node d2" cx="480" cy="200" r="2"/>
    <circle class="node d4" cx="495" cy="260" r="2"/>
    <circle class="node d6" cx="470" cy="320" r="2"/>
    <circle class="node d1" cx="500" cy="380" r="2"/>
    <circle class="node d3" cx="485" cy="120" r="2"/>
  </g>
</svg>
