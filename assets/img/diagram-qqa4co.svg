<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Inter, 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a2238"/>
    </marker>
  </defs>

  <rect width="720" height="400" fill="#fdfdfb"/>

  <!-- Stage 1: discrete problem -->
  <text x="120" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2238">Discrete problem</text>
  <text x="120" y="96" text-anchor="middle" font-size="11" fill="#4a5168">x &#8712; {0,1}&#8319;</text>
  <g stroke="#1a2238" stroke-width="1">
    <rect x="60" y="120" width="24" height="24" fill="#1e2c56"/><rect x="88" y="120" width="24" height="24" fill="none"/><rect x="116" y="120" width="24" height="24" fill="#1e2c56"/><rect x="144" y="120" width="24" height="24" fill="none"/>
    <rect x="60" y="148" width="24" height="24" fill="none"/><rect x="88" y="148" width="24" height="24" fill="#1e2c56"/><rect x="116" y="148" width="24" height="24" fill="none"/><rect x="144" y="148" width="24" height="24" fill="#1e2c56"/>
    <rect x="60" y="176" width="24" height="24" fill="#1e2c56"/><rect x="88" y="176" width="24" height="24" fill="#1e2c56"/><rect x="116" y="176" width="24" height="24" fill="none"/><rect x="144" y="176" width="24" height="24" fill="none"/>
    <rect x="60" y="204" width="24" height="24" fill="none"/><rect x="88" y="204" width="24" height="24" fill="#1e2c56"/><rect x="116" y="204" width="24" height="24" fill="#1e2c56"/><rect x="144" y="204" width="24" height="24" fill="none"/>
  </g>
  <text x="120" y="262" text-anchor="middle" font-size="10.5" fill="#4a5168">MIS &#183; Max-Cut &#183; TSP</text>
  <text x="120" y="279" text-anchor="middle" font-size="10.5" fill="#4a5168">spin glass &#183; 20+ classes</text>

  <line x1="188" y1="176" x2="238" y2="176" stroke="#1a2238" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="213" y="162" text-anchor="middle" font-size="10" fill="#b8860b" font-weight="600">relax</text>

  <!-- Stage 2: continuous annealing -->
  <text x="360" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2238">Continuous relaxation</text>
  <text x="360" y="96" text-anchor="middle" font-size="11" fill="#4a5168">p &#8712; [0,1]&#8319; &#8212; gradient-based parallel annealing on GPU</text>

  <!-- energy landscape -->
  <path d="M 258 220 C 280 150, 305 150, 325 200 C 340 238, 356 238, 372 190 C 386 150, 404 148, 420 196 C 436 240, 452 242, 466 210"
        fill="none" stroke="#1e2c56" stroke-width="1.8"/>
  <!-- parallel walkers -->
  <circle cx="300" cy="172" r="7" fill="#b8860b"/>
  <circle cx="352" cy="226" r="7" fill="#b8860b"/>
  <circle cx="430" cy="216" r="7" fill="#b8860b"/>
  <path d="M 306 180 q 8 14 14 24" fill="none" stroke="#b8860b" stroke-width="1.3" marker-end="url(#arrow2)"/>
  <path d="M 424 224 q -6 8 -12 12" fill="none" stroke="#b8860b" stroke-width="1.3" marker-end="url(#arrow2)"/>
  <text x="360" y="279" text-anchor="middle" font-size="10.5" fill="#4a5168">PQQA (ICLR 2025) &#183; CRA-PI-GNN &#183; CPRA</text>

  <line x1="482" y1="176" x2="532" y2="176" stroke="#1a2238" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="507" y="162" text-anchor="middle" font-size="10" fill="#b8860b" font-weight="600">anneal</text>

  <!-- Stage 3: solution -->
  <text x="612" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2238">Discrete solution</text>
  <text x="612" y="96" text-anchor="middle" font-size="11" fill="#4a5168">best / diverse solutions</text>
  <g stroke="#b8860b" stroke-width="1.2">
    <rect x="552" y="120" width="24" height="24" fill="#b8860b"/><rect x="580" y="120" width="24" height="24" fill="#b8860b"/><rect x="608" y="120" width="24" height="24" fill="none"/><rect x="636" y="120" width="24" height="24" fill="#b8860b"/>
    <rect x="552" y="148" width="24" height="24" fill="none"/><rect x="580" y="148" width="24" height="24" fill="#b8860b"/><rect x="608" y="148" width="24" height="24" fill="#b8860b"/><rect x="636" y="148" width="24" height="24" fill="none"/>
    <rect x="552" y="176" width="24" height="24" fill="#b8860b"/><rect x="580" y="176" width="24" height="24" fill="none"/><rect x="608" y="176" width="24" height="24" fill="#b8860b"/><rect x="636" y="176" width="24" height="24" fill="#b8860b"/>
    <rect x="552" y="204" width="24" height="24" fill="none"/><rect x="580" y="204" width="24" height="24" fill="#b8860b"/><rect x="608" y="204" width="24" height="24" fill="none"/><rect x="636" y="204" width="24" height="24" fill="#b8860b"/>
  </g>
  <text x="612" y="262" text-anchor="middle" font-size="10.5" fill="#4a5168">CLI &#183; Streamlit dashboard</text>
  <text x="612" y="279" text-anchor="middle" font-size="10.5" fill="#4a5168">live visualization</text>

  <!-- bottom rail -->
  <line x1="60" y1="322" x2="660" y2="322" stroke="#b8860b" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="360" y="348" text-anchor="middle" font-size="11" fill="#4a5168">One GPU-friendly API &#8212; SA / Population-Annealing baselines included</text>
</svg>
