<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Inter, 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a2238"/>
    </marker>
  </defs>

  <rect width="720" height="400" fill="#fdfdfb"/>

  <!-- Input model -->
  <rect x="24" y="160" width="140" height="80" rx="4" fill="none" stroke="#1a2238" stroke-width="1.5"/>
  <text x="94" y="194" text-anchor="middle" font-size="14" font-weight="600" fill="#1a2238">FP16 LLM</text>
  <text x="94" y="216" text-anchor="middle" font-size="10.5" fill="#4a5168">Llama &#183; Qwen3 &#183; Gemma</text>

  <line x1="164" y1="200" x2="204" y2="200" stroke="#1a2238" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OneComp container -->
  <rect x="212" y="56" width="300" height="288" rx="4" fill="none" stroke="#b8860b" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="362" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#b8860b" letter-spacing="1">OneComp</text>
  <text x="362" y="104" text-anchor="middle" font-size="10.5" fill="#4a5168" font-family="Consolas, monospace">Runner.auto_run(model_id)</text>

  <!-- Step 1 -->
  <rect x="236" y="122" width="252" height="56" rx="3" fill="#f6f5f0" stroke="#1a2238" stroke-width="1.2"/>
  <text x="362" y="145" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1a2238">1. AutoBit</text>
  <text x="362" y="164" text-anchor="middle" font-size="10.5" fill="#4a5168">VRAM detection &#8594; ILP bit-width assignment</text>

  <line x1="362" y1="178" x2="362" y2="196" stroke="#1a2238" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="236" y="198" width="252" height="56" rx="3" fill="#f6f5f0" stroke="#1a2238" stroke-width="1.2"/>
  <text x="362" y="221" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1a2238">2. Quantize</text>
  <text x="362" y="240" text-anchor="middle" font-size="10.5" fill="#4a5168">QEP &#183; GPTQ &#183; DBF &#183; OneBit</text>

  <line x1="362" y1="254" x2="362" y2="272" stroke="#1a2238" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="236" y="274" width="252" height="56" rx="3" fill="#f6f5f0" stroke="#1a2238" stroke-width="1.2"/>
  <text x="362" y="297" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1a2238">3. Evaluate &amp; Save</text>
  <text x="362" y="316" text-anchor="middle" font-size="10.5" fill="#4a5168">perplexity &#183; accuracy</text>

  <line x1="512" y1="200" x2="552" y2="200" stroke="#1a2238" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="560" y="126" width="136" height="66" rx="4" fill="#1e2c56"/>
  <text x="628" y="154" text-anchor="middle" font-size="13" font-weight="600" fill="#fdfdfb">1-bit model</text>
  <text x="628" y="174" text-anchor="middle" font-size="10.5" fill="#c9d2ec">~90% accuracy kept</text>

  <line x1="628" y1="192" x2="628" y2="212" stroke="#1a2238" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="560" y="214" width="136" height="60" rx="4" fill="none" stroke="#1a2238" stroke-width="1.5"/>
  <text x="628" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2238">vLLM serving</text>
  <text x="628" y="258" text-anchor="middle" font-size="10.5" fill="#4a5168">built-in plugins</text>
</svg>
